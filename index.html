<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IJA STEAM — Final Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Baloo+2:wght@700;800;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#0a84ff;--blue-dark:#0047AB;--red:#FF2D4B;--red-dark:#B3001B;--yellow:#FFD600;--purple:#8B00E6}
html,body{width:100%;height:100%;font-family:'Nunito',sans-serif;background:#05060c;overflow:hidden;color:#fff}

/* ── SPLIT BATTLE BACKGROUND ── */
.arena{position:fixed;inset:0;z-index:0;overflow:hidden}
.arena .side{position:absolute;top:0;bottom:0;width:62%}
.arena .left{left:0;background:linear-gradient(120deg,#001a40 0%,#003a8c 60%,#0a84ff 140%);clip-path:polygon(0 0,100% 0,82% 100%,0 100%)}
.arena .right{right:0;background:linear-gradient(240deg,#3d0010 0%,#8b0016 60%,#ff2d4b 140%);clip-path:polygon(18% 0,100% 0,100% 100%,0 100%)}
.arena .seam{position:absolute;top:-5%;bottom:-5%;left:50%;width:6px;transform:translateX(-50%) skewX(-9deg);background:linear-gradient(180deg,transparent,rgba(255,214,0,.9),rgba(255,255,255,.9),rgba(255,214,0,.9),transparent);filter:blur(1px);box-shadow:0 0 30px rgba(255,214,0,.7),0 0 80px rgba(255,255,255,.4);z-index:2}
.arena .glow{position:absolute;inset:0;background:radial-gradient(ellipse 40% 60% at 18% 50%,rgba(10,132,255,.5),transparent 60%),radial-gradient(ellipse 40% 60% at 82% 50%,rgba(255,45,75,.5),transparent 60%)}
.grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);background-size:54px 54px;-webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%)}
.sparks{position:fixed;inset:0;z-index:30;pointer-events:none;overflow:hidden}

/* ── HEADER + TABS ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;flex-direction:column;align-items:center;padding:20px 16px 0;gap:12px}
.title{font-family:'Fredoka One',cursive;font-size:clamp(20px,3vw,34px);color:var(--yellow);letter-spacing:1px;text-shadow:0 4px 22px rgba(255,214,0,.4),3px 3px 0 rgba(0,0,0,.3);text-align:center}
.title small{display:block;font-family:'Nunito',sans-serif;font-size:clamp(9px,1.1vw,12px);font-weight:900;letter-spacing:5px;color:rgba(255,255,255,.6);margin-bottom:2px}
.cats{display:flex;gap:12px}
.cat{font-family:'Fredoka One',cursive;font-size:clamp(13px,1.6vw,17px);color:#fff;background:rgba(8,10,20,.7);border:2px solid rgba(255,214,0,.25);border-radius:14px;padding:10px 22px;cursor:pointer;transition:transform .18s cubic-bezier(.34,1.56,.64,1),border-color .18s;backdrop-filter:blur(6px)}
.cat:hover{transform:translateY(-2px);border-color:rgba(255,214,0,.6)}
.cat.on{background:linear-gradient(135deg,var(--purple),#6d28d9);border-color:var(--yellow);box-shadow:0 8px 26px rgba(139,0,230,.5)}

/* ── STAGE ── */
.stage{position:relative;z-index:20;height:100%;display:flex;align-items:center;justify-content:center;gap:0}
.stage.shake{animation:shake .5s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{10%,90%{transform:translate(-2px,0)}20%,80%{transform:translate(4px,0)}30%,50%,70%{transform:translate(-8px,0)}40%,60%{transform:translate(8px,0)}}

.fighter{flex:1;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px;opacity:0}
.fighter.in.left{animation:inL .7s cubic-bezier(.18,.89,.32,1.1) forwards}
.fighter.in.right{animation:inR .7s cubic-bezier(.18,.89,.32,1.1) forwards}
@keyframes inL{0%{opacity:0;transform:translateX(-120%) scale(.8)}100%{opacity:1;transform:translateX(0) scale(1)}}
@keyframes inR{0%{opacity:0;transform:translateX(120%) scale(.8)}100%{opacity:1;transform:translateX(0) scale(1)}}

.avatar{width:clamp(120px,18vw,210px);height:clamp(120px,18vw,210px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:clamp(48px,8vw,96px);color:#fff;position:relative;border:5px solid rgba(255,255,255,.25)}
.fighter.left .avatar{background:linear-gradient(135deg,var(--blue-dark),var(--blue));box-shadow:0 0 0 10px rgba(10,132,255,.12),0 0 60px rgba(10,132,255,.6)}
.fighter.right .avatar{background:linear-gradient(135deg,var(--red-dark),var(--red));box-shadow:0 0 0 10px rgba(255,45,75,.12),0 0 60px rgba(255,45,75,.6)}
.avatar::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:3px solid transparent;animation:spinRing 4s linear infinite}
.fighter.left .avatar::after{border-top-color:rgba(10,132,255,.8);border-right-color:rgba(10,132,255,.3)}
.fighter.right .avatar::after{border-top-color:rgba(255,45,75,.8);border-right-color:rgba(255,45,75,.3)}
@keyframes spinRing{to{transform:rotate(360deg)}}

.f-name{font-family:'Fredoka One',cursive;font-size:clamp(30px,5vw,62px);line-height:1;text-align:center;text-shadow:0 4px 20px rgba(0,0,0,.5)}
.fighter.left .f-name{color:#7fc0ff}
.fighter.right .f-name{color:#ff8095}
.f-sub{font-size:clamp(13px,1.8vw,20px);font-weight:900;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.7)}
.f-tag{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:20px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}

/* ── VS BADGE ── */
.vs-zone{position:relative;z-index:25;width:0;display:flex;align-items:center;justify-content:center}
.vs{font-family:'Fredoka One',cursive;font-size:clamp(70px,13vw,170px);line-height:1;background:linear-gradient(135deg,#fff,#FFD600 45%,#ff6a00);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 24px rgba(255,214,0,.7));opacity:0;transform:scale(3) rotate(-18deg)}
.vs.in{animation:slam .45s cubic-bezier(.2,1.4,.3,1) .55s forwards}
@keyframes slam{0%{opacity:0;transform:scale(3) rotate(-18deg)}60%{opacity:1;transform:scale(.85) rotate(6deg)}100%{opacity:1;transform:scale(1) rotate(-7deg)}}
.shock{position:absolute;width:40px;height:40px;border-radius:50%;border:5px solid rgba(255,214,0,.9);opacity:0}
.shock.go{animation:shock .6s ease-out .58s forwards}
@keyframes shock{0%{opacity:.9;transform:scale(.3)}100%{opacity:0;transform:scale(14)}}
.flash{position:fixed;inset:0;z-index:28;background:#fff;opacity:0;pointer-events:none}
.flash.go{animation:flash .4s ease-out .56s}
@keyframes flash{0%{opacity:0}15%{opacity:.55}100%{opacity:0}}

/* ── REPLAY ── */
.replay{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:40;font-family:'Fredoka One',cursive;font-size:16px;color:#05060c;background:linear-gradient(135deg,var(--yellow),#ff9d00);border:none;border-radius:16px;padding:13px 30px;cursor:pointer;box-shadow:0 6px 0 #a87c00,0 10px 30px rgba(255,214,0,.4);transition:transform .15s}
.replay:hover{transform:translateX(-50%) translateY(-2px)}
.replay:active{transform:translateX(-50%) translateY(2px);box-shadow:0 3px 0 #a87c00}

@media(max-width:760px){
  .stage{flex-direction:column;gap:0}
  .arena .left{width:100%;height:58%;clip-path:polygon(0 0,100% 0,100% 82%,0 100%)}
  .arena .right{width:100%;height:58%;top:auto;bottom:0;clip-path:polygon(0 18%,100% 0,100% 100%,0 100%)}
  .arena .seam{top:48%;bottom:auto;left:-5%;right:-5%;width:auto;height:6px;transform:skewY(-6deg)}
  .fighter{max-width:none}
  .vs-zone{height:0}
}
</style>
</head>
<body>
<div class="arena">
  <div class="side left"></div>
  <div class="side right"></div>
  <div class="glow"></div>
  <div class="seam"></div>
</div>
<div class="grid"></div>
<div class="sparks" id="sparks"></div>
<div class="flash" id="flash"></div>

<div class="topbar">
  <div class="title"><small>★ Infant Jesus Academy ★</small>STEAM GRAND FINAL</div>
  <div class="cats" id="cats"></div>
</div>

<div class="stage" id="stage">
  <div class="fighter left" id="fL">
    <div class="avatar" id="fL-av">E</div>
    <div class="f-name" id="fL-name">Ebube</div>
    <div class="f-sub" id="fL-sub">Year 7</div>
    <div class="f-tag">Challenger</div>
  </div>
  <div class="vs-zone"><span class="shock" id="shock"></span><div class="vs" id="vs">VS</div></div>
  <div class="fighter right" id="fR">
    <div class="avatar" id="fR-av">S</div>
    <div class="f-name" id="fR-name">Stephanie</div>
    <div class="f-sub" id="fR-sub">Year 8</div>
    <div class="f-tag">Challenger</div>
  </div>
</div>

<button class="replay" onclick="runBattle(true)">⚔️ Replay Battle</button>

<script>
var BATTLES = {
  junior: { left:{name:'Ebube', sub:'Year 7', av:'E'}, right:{name:'Stephanie', sub:'Year 8', av:'S'} },
  senior: { left:{name:'Year 10', sub:'Senior', av:'10'}, right:{name:'Year 11', sub:'Senior', av:'11'} }
};
var current = 'junior';

function renderCats(){
  document.getElementById('cats').innerHTML =
    '<button class="cat'+(current==='junior'?' on':'')+'" onclick="selectCat(\'junior\')">Junior · Yr 7 vs 8</button>'+
    '<button class="cat'+(current==='senior'?' on':'')+'" onclick="selectCat(\'senior\')">Senior · Yr 10 vs 11</button>';
}
function selectCat(c){ current=c; renderCats(); applyFighters(); runBattle(true); }

function applyFighters(){
  var b=BATTLES[current];
  document.getElementById('fL-av').textContent=b.left.av;
  document.getElementById('fL-name').textContent=b.left.name;
  document.getElementById('fL-sub').textContent=b.left.sub;
  document.getElementById('fR-av').textContent=b.right.av;
  document.getElementById('fR-name').textContent=b.right.name;
  document.getElementById('fR-sub').textContent=b.right.sub;
}

/* ── Web Audio impact (only on user gesture) ── */
var _ax=null;
function ax(){ if(!_ax){try{_ax=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} return _ax; }
function whoosh(){
  var a=ax(); if(!a)return;
  var n=a.createBufferSource(),buf=a.createBuffer(1,a.sampleRate*0.4,a.sampleRate),d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++){d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);}
  n.buffer=buf;var bp=a.createBiquadFilter();bp.type='bandpass';bp.frequency.setValueAtTime(300,a.currentTime);bp.frequency.exponentialRampToValueAtTime(2400,a.currentTime+0.35);
  var g=a.createGain();g.gain.value=0.25;n.connect(bp);bp.connect(g);g.connect(a.destination);n.start();
}
function boom(){
  var a=ax(); if(!a)return;
  var o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.setValueAtTime(180,a.currentTime);o.frequency.exponentialRampToValueAtTime(45,a.currentTime+0.45);
  g.gain.setValueAtTime(0.5,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.6);
  o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+0.62);
  /* metallic clang */
  var n=a.createBufferSource(),buf=a.createBuffer(1,a.sampleRate*0.25,a.sampleRate),d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++){d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);}
  n.buffer=buf;var hp=a.createBiquadFilter();hp.type='highpass';hp.frequency.value=2500;
  var g2=a.createGain();g2.gain.value=0.3;n.connect(hp);hp.connect(g2);g2.connect(a.destination);n.start();
}

function burstSparks(){
  var host=document.getElementById('sparks');
  var cols=['#FFD600','#fff','#0a84ff','#FF2D4B','#ff9d00'];
  for(var i=0;i<34;i++){
    var s=document.createElement('div');
    var sz=4+Math.random()*9, ang=Math.random()*Math.PI*2, dist=80+Math.random()*340;
    var dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist;
    s.style.cssText='position:absolute;left:50%;top:50%;width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+cols[i%cols.length]+';box-shadow:0 0 10px '+cols[i%cols.length]+';transform:translate(-50%,-50%);opacity:1;pointer-events:none';
    host.appendChild(s);
    (function(el,dx,dy){
      el.animate([{transform:'translate(-50%,-50%) translate(0,0) scale(1)',opacity:1},
                  {transform:'translate(-50%,-50%) translate('+dx+'px,'+dy+'px) scale(0)',opacity:0}],
                 {duration:600+Math.random()*300,easing:'cubic-bezier(.2,.7,.3,1)'}).onfinish=function(){el.remove();};
    })(s,dx,dy);
  }
}

function runBattle(withSound){
  var fL=document.getElementById('fL'),fR=document.getElementById('fR'),vs=document.getElementById('vs'),
      shock=document.getElementById('shock'),flash=document.getElementById('flash'),stage=document.getElementById('stage');
  /* reset */
  fL.classList.remove('in');fR.classList.remove('in');vs.classList.remove('in');
  shock.classList.remove('go');flash.classList.remove('go');stage.classList.remove('shake');
  void fL.offsetWidth; /* force reflow to restart animations */
  /* fire */
  fL.classList.add('in');fR.classList.add('in');vs.classList.add('in');
  shock.classList.add('go');flash.classList.add('go');
  if(withSound){ try{ if(ax()&&ax().state==='suspended')ax().resume(); whoosh(); }catch(e){} }
  setTimeout(function(){
    stage.classList.add('shake');
    burstSparks();
    if(withSound){ try{ boom(); }catch(e){} }
  }, 580);
}

renderCats();
applyFighters();
runBattle(false);   /* first run silent (autoplay blocked); Replay/tab = with sound */
</script>
</body>
</html>
